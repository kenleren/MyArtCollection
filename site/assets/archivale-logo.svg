<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 368 128" role="img" aria-labelledby="title desc">
  <title id="title">Archivale: Art Records logo</title>
  <desc id="desc">A framed archival A mark beside the Archivale wordmark.</desc>
  <defs>
    <linearGradient id="gold" x1="16" y1="14" x2="118" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0d99b"/>
      <stop offset=".5" stop-color="#c8a15a"/>
      <stop offset="1" stop-color="#8d6a35"/>
    </linearGradient>
  </defs>

  <g class="mark">
