    <path d="M141 81 H211 M309 81 H366" stroke="#c8a15a" stroke-width="1.45" stroke-opacity=".9"/>
    <path d="M260 76 L266 82 L260 88 L254 82 Z" fill="#c8a15a"/>
    <text x="218" y="101" fill="#d8c3a0" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="4.2">ART RECORDS</text>
  </g>
</svg>
