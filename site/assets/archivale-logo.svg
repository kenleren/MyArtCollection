    <path d="M37 22 H91 L96 28 H106 V41 L112 46 V82 L106 87 V100 H96 L91 106 H37 L32 100 H22 V87 L16 82 V46 L22 41 V28 H32 Z" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <path d="M42 30 H86 L91 36 H98 V44 L104 49 V79 L98 84 V92 H91 L86 98 H42 L37 92 H30 V84 L24 79 V49 L30 44 V36 H37 Z" fill="none" stroke="#ecd7a4" stroke-opacity=".72" stroke-width="1.7"/>
    <path d="M49 86 L64 40 L79 86 M55 69 H73" fill="none" stroke="#f5ead2" stroke-width="5.7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M64 30 V41 M64 87 V99 M28 64 H40 M88 64 H100" stroke="#c8a15a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M64 72 L68 76 L64 80 L60 76 Z" fill="#c8a15a"/>
  </g>

  <g class="wordmark">
