title = "MyArtCollection secret scanning"

[extend]
useDefault = true

[[rules]]
id = "firebase-service-account-json"
description = "Google/Firebase service-account JSON marker"
regex = '''"type"\s*:\s*"service_account"'''
keywords = [
  "service_account",
]

[[rules]]
id = "firebase-service-account-private-key"
description = "Google/Firebase service-account private key field"
regex = '''"private_key"\s*:\s*"-----BEGIN PRIVATE KEY-----'''
keywords = [
  "private_key",
  "BEGIN PRIVATE KEY",
]

[[rules]]
id = "firebase-refresh-token-json"
description = "Firebase CLI or Google OAuth refresh token JSON field"
regex = '''"refresh_token"\s*:\s*"[^"]{20,}"'''
keywords = [
  "refresh_token",
]

[[rules]]
id = "android-release-signing-key-properties"
description = "Android release-signing credential properties"
regex = '''(?i)(storePassword|keyPassword|storeFile|keyAlias)\s*[:=]\s*["']?[^\s#"']{4,}'''
path = '''(?i)(^|/)(README\.md|docs/[^/]+\.md|[^/]+\.properties|[^/]+\.sh|\.env(\.[^/]+)?|[^/]+\.ya?ml)$'''
keywords = [
  "storePassword",
  "keyPassword",
  "storeFile",
  "keyAlias",
]

[[rules]]
id = "android-release-signing-env-assignment"
description = "Android release-signing environment or shell assignment"
regex = '''MY_ART_COLLECTION_ANDROID_RELEASE_(STORE_FILE|STORE_PASSWORD|KEY_ALIAS|KEY_PASSWORD)\s*=\s*["']?[^\s#"']{4,}'''
path = '''(?i)(^|/)(README\.md|docs/[^/]+\.md|[^/]+\.sh|\.env(\.[^/]+)?|[^/]+\.ya?ml)$'''
keywords = [
  "MY_ART_COLLECTION_ANDROID_RELEASE_",
]
