name: Release Readiness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22.23.1
  JAVA_VERSION: 17.0.19+10
  PYTHON_VERSION: 3.12.13
  FLUTTER_VERSION: 3.44.4
  FLUTTER_LINUX_X64_SHA256: c853cda0312a162854c481fe6a1bc286d84fbb74bfab7037c39750061dc9b466

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Verify checkout credentials are not persisted
        shell: bash
        run: |
          set -euo pipefail
          if git config --local --get-regexp '^(http\..*\.extraheader|credential\..*)$' >/dev/null; then
            echo "Checkout left a repository credential in local git config" >&2
            exit 1
          fi
      - name: Install checksum-verified actionlint
        shell: bash
        run: |
          set -euo pipefail
          archive=actionlint_1.7.12_linux_amd64.tar.gz
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v1.7.12/${archive}"
          printf '%s  %s\n' \
            '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8' \
            "$archive" | sha256sum -c -
          tar -xzf "$archive" actionlint
          ./actionlint -color

  flutter-quality:
    name: Flutter quality
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Restore Dart dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-
      - name: Install checksum-verified Flutter
        shell: bash
        run: |
          set -euo pipefail
          archive="flutter_linux_${FLUTTER_VERSION}-stable.tar.xz"
          curl -fsSLO "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/${archive}"
          printf '%s  %s\n' "$FLUTTER_LINUX_X64_SHA256" "$archive" | sha256sum -c -
          tar -xJf "$archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
      - name: Install PDF text extraction for report assertions
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/poppler-apt-evidence"
          archives="$evidence/archives"
          mkdir -p "$archives/partial"
          sudo apt-get update
          apt-get --simulate install --no-install-recommends poppler-utils \
            > "$evidence/simulation.txt"
          awk '
            /^Inst / {
              package_name=$2
              version=""
              architecture=$NF
              gsub(/[\[\])]/, "", architecture)
              for (i=3; i<=NF; i++) {
                if ($i ~ /^\(/) {
                  version=$i
                  gsub(/^\(/, "", version)
                  break
                }
              }
              if (version == "" || architecture == "") exit 1
              print package_name "\t" version "\t" architecture
            }
          ' "$evidence/simulation.txt" | LC_ALL=C sort -u > "$evidence/expected.tsv"
          sudo apt-get -o "Dir::Cache::archives=$archives" install \
            --yes --download-only --no-install-recommends poppler-utils
          : > "$evidence/actual.tsv"
          while IFS= read -r -d '' archive; do
            package_name="$(dpkg-deb -f "$archive" Package)"
            version="$(dpkg-deb -f "$archive" Version)"
            architecture="$(dpkg-deb -f "$archive" Architecture)"
            digest="$(sha256sum "$archive" | cut -d ' ' -f 1)"
            printf '%s\t%s\t%s\t%s\n' \
              "$package_name" "$version" "$architecture" "$digest" \
              >> "$evidence/actual.tsv"
          done < <(find "$archives" -maxdepth 1 -type f -name '*.deb' -print0)
          cut -f 1-3 "$evidence/actual.tsv" | LC_ALL=C sort -u \
            > "$evidence/actual-coordinates.tsv"
          diff -u "$evidence/expected.tsv" "$evidence/actual-coordinates.tsv"
          awk -F '\t' 'NF != 4 || $4 !~ /^[0-9a-f]{64}$/ { exit 1 }' \
            "$evidence/actual.tsv"
          sha256sum \
            "$evidence/simulation.txt" \
            "$evidence/expected.tsv" \
            "$evidence/actual.tsv" \
            "$evidence/actual-coordinates.tsv" \
            > "$evidence/runtime-evidence.sha256"
          test "$(wc -l < "$evidence/runtime-evidence.sha256")" -eq 4
          sudo apt-get -o "Dir::Cache::archives=$archives" install \
            --yes --no-download --no-install-recommends poppler-utils
          pdftotext -v
      - name: Map checksum-verified Flutter test fonts
        shell: bash
        run: |
          set -euo pipefail
          roboto="$RUNNER_TEMP/flutter/bin/cache/artifacts/material_fonts/Roboto-Regular.ttf"
          test -f "$roboto"
          sudo install -d /opt/homebrew/share /System/Library/Fonts
          sudo ln -s "$RUNNER_TEMP/flutter" /opt/homebrew/share/flutter
          sudo ln -s "$roboto" /System/Library/Fonts/SFNS.ttf
      - name: Fetch locked Flutter dependencies
        run: flutter pub get --enforce-lockfile
      - name: Check formatting, analysis, and tests
        run: |
          dart format --set-exit-if-changed lib test
          flutter analyze
          flutter test --concurrency=1

  android-debug-package:
    name: Android debug package
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Validate Android protected-input boundary
        shell: bash
        run: |
          set -euo pipefail
          bash test/android_ci_input_guard_test.sh
          bash scripts/check_android_ci_inputs.sh
      - name: Validate Gradle wrapper supply chain
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify_gradle_wrapper.sh
          bash test/gradle_wrapper_validation_test.sh
      - name: Validate native attachment viewer policy
        run: bash test/attachment_native_viewer_policy_test.sh
      - name: Test native attachment custody crash and race contracts
        run: |
          bash test/attachment_custody_instrumentation_contract_test.sh
          bash test/attachment_custody_native_test.sh
          ATTACHMENT_CUSTODY_SANITIZERS=address,undefined bash test/attachment_custody_native_test.sh
          ATTACHMENT_CUSTODY_SANITIZERS=thread bash test/attachment_custody_native_test.sh
          bash test/attachment_custody_release_symbol_test.sh
      - name: Set up Temurin Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: 17.0.19+10
      - name: Restore Dart dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-
      - name: Install checksum-verified Flutter
        shell: bash
        run: |
          set -euo pipefail
          archive="flutter_linux_${FLUTTER_VERSION}-stable.tar.xz"
          curl -fsSLO "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/${archive}"
          printf '%s  %s\n' "$FLUTTER_LINUX_X64_SHA256" "$archive" | sha256sum -c -
          tar -xJf "$archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
      - name: Fetch locked Flutter dependencies
        run: flutter pub get --enforce-lockfile
      - name: Build a secret-free debug APK
        run: flutter build apk --debug --no-pub
      - name: Prove attachment custody release hooks are absent
        shell: bash
        run: |
          set -euo pipefail
          (
            cd android
            java -Dorg.gradle.appname=gradlew \
              -classpath gradle/wrapper/gradle-wrapper.jar \
              org.gradle.wrapper.GradleWrapperMain \
              :app:externalNativeBuildRelease
          )
          mapfile -t custody_libraries < <(
            find build/app/intermediates/cxx/release \
              -name libattachment_custody.so \
              -type f
          )
          test "${#custody_libraries[@]}" -gt 0
          bash test/attachment_custody_release_symbol_test.sh "${custody_libraries[@]}"
      - name: Test Android private-file destination policies
        working-directory: android
        run: >-
          java -Dorg.gradle.appname=gradlew
          -classpath gradle/wrapper/gradle-wrapper.jar
          org.gradle.wrapper.GradleWrapperMain
          :app:testDebugUnitTest
          --tests app.archivale.AttachmentViewerPolicyTest
          --tests app.archivale.AttachmentCustodyNativeAccessTest
          --tests app.archivale.ExportSaveCopyPolicyTest
          --tests app.archivale.ExportSaveCallbackPolicyTest

  backend-and-audit:
    name: Backend and audit policy
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
      - name: Set up Temurin Java 21 for Firestore emulator
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: '21'
      - name: Restore npm dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.npm/_cacache
          key: npm-${{ runner.os }}-${{ hashFiles('backend/broker/package-lock.json', 'backend/forms/package-lock.json', 'backend/play_billing/package-lock.json', 'backend/release_policy_workers_free/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - name: Enforce broker audit policy
        shell: bash
        run: |
          set -euo pipefail
          full_audit_cache="$RUNNER_TEMP/broker-full-audit-cache"
          core_audit_cache="$RUNNER_TEMP/broker-core-audit-cache"
          mkdir -p "$full_audit_cache" "$core_audit_cache"
          set +e
          npm --prefix backend/broker audit --package-lock-only --json \
            --cache "$full_audit_cache" > "$RUNNER_TEMP/broker-audit.json"
          full_audit_status=$?
          npm --prefix backend/broker audit --package-lock-only --omit=peer --json \
            --cache "$core_audit_cache" > "$RUNNER_TEMP/broker-core-audit.json"
          core_audit_status=$?
          set -e
          sha256sum \
            "$RUNNER_TEMP/broker-audit.json" \
            "$RUNNER_TEMP/broker-core-audit.json" \
            > "$RUNNER_TEMP/broker-audit-runtime-evidence.sha256"
          test "$(wc -l < "$RUNNER_TEMP/broker-audit-runtime-evidence.sha256")" -eq 2
          test "$full_audit_status" -eq 1 || { echo "full npm audit did not report the expected policy input" >&2; exit 1; }
          test "$core_audit_status" -eq 1 || { echo "peer-omitted npm audit did not report the expected policy input" >&2; exit 1; }
          node scripts/check_broker_audit.mjs \
            --audit "$RUNNER_TEMP/broker-audit.json" \
            --core-audit "$RUNNER_TEMP/broker-core-audit.json" \
            --lock backend/broker/package-lock.json
      - name: Test broker audit parser fixtures
        run: node --test test/broker_audit_policy_test.mjs
      - name: Require a clean forms dependency audit
        shell: bash
        run: |
          set -euo pipefail
          forms_audit_cache="$RUNNER_TEMP/forms-audit-cache"
          mkdir -p "$forms_audit_cache"
          npm --prefix backend/forms audit --package-lock-only --audit-level=info \
            --cache "$forms_audit_cache"
      - name: Reject high-severity Play Billing dependencies
        run: npm --prefix backend/play_billing audit --package-lock-only --audit-level=high
      - name: Test backend packages
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix backend/broker ci
          npm --prefix backend/broker test
          npm --prefix backend/forms ci
          npm --prefix backend/forms test
          npm --prefix backend/play_billing ci
          npm --prefix backend/play_billing test
          npm --prefix backend/release_policy_workers_free ci --ignore-scripts
          npm --prefix backend/release_policy_workers_free test
          npm --prefix backend/release_policy_workers_free run test:runtime-contract
          npm --prefix backend/release_policy_workers_free run test:sqlite-conformance
          npm --prefix backend/release_policy_workers_free run sbom:generate
          npm --prefix backend/release_policy_workers_free run artifact:verify
          npm --prefix backend/release_policy_workers_free run restore:rehearsal
      - name: Run pinned Play Billing Firestore emulator evidence
        run: npm --prefix backend/play_billing run test:emulator:ci

  static-site:
    name: Static site validation
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.12.13
      - name: Validate static site
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest discover -s test -p 'validate_static_site_test.py'
          python3 scripts/validate_static_site.py
          python3 -m py_compile scripts/validate_static_site.py test/validate_static_site_test.py
          jq . firebase.json
          python3 -c 'from scripts import generate_sitemap as s; routes=sorted(s.route_for_html(p) for p in s.SITE_ROOT.glob("**/*.html")); routes.remove("/"); routes.insert(0, "/"); expected=s.sitemap_xml(routes); actual=s.SITEMAP_PATH.read_text(encoding="utf-8"); assert actual == expected, "site/sitemap.xml is stale"'

  release-policy-trust:
    name: Release policy trust source
    runs-on: ubuntu-24.04
    env:
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      EVENT_NAME: ${{ github.event_name }}
      EXPECTED_MAIN_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
      PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
      PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
      VERIFICATION_MODE: ${{ github.event_name == 'pull_request' && 'frozen-bootstrap-pr' || 'post-merge-main' }}
    steps:
      - name: Check out full repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
      - name: Verify credential-free trust source and evidence
        shell: bash
        run: |
          set -euo pipefail
          base=f42582c8eb0d1405cd5e214f6b9c80980225b5f1
          npm --prefix backend/release_policy_trust ci --ignore-scripts
          npm --prefix backend/release_policy_trust run build
          npm --prefix backend/release_policy_trust run test:history
          npm --prefix backend/release_policy_trust run test:webhook
          npm --prefix backend/release_policy_trust run test:pagination
          npm --prefix backend/release_policy_trust run test:receipt
          npm --prefix backend/release_policy_trust run test:external
          npm --prefix backend/release_policy_trust run test:conformance
          npm --prefix backend/release_policy_trust run test:api-boundary
          npm --prefix backend/release_policy_trust run test:ci-checkout
          npm --prefix backend/release_policy_trust test
          npm --prefix backend/release_policy_trust audit \
            --package-lock-only --audit-level=info
          npm --prefix backend/release_policy_trust run evidence:verify -- \
            --tip "$base" \
            --input backend/release_policy_trust/evidence/base
          case "$EVENT_NAME" in
            pull_request)
              change_base="$PULL_REQUEST_BASE_SHA"
              ;;
            push)
              change_base="$PUSH_BEFORE_SHA"
              ;;
            workflow_dispatch)
              change_base="$(git rev-parse --verify "$CANDIDATE_SHA^")"
              ;;
            *)
              echo "Unsupported Release Readiness event" >&2
              exit 1
              ;;
          esac
          if [[ ! "$change_base" =~ ^[0-9a-f]{40}$ ]] || \
             [[ "$change_base" == 0000000000000000000000000000000000000000 ]]; then
            echo "Event change base is missing or invalid" >&2
            exit 1
          fi
          if git diff --quiet --no-renames \
            "$change_base" "$CANDIDATE_SHA" -- \
            backend/release_policy_trust \
            .github/CODEOWNERS \
            .github/workflows/release-readiness.yml \
            .gitleaksignore \
            docs/RELEASE_POLICY_TRUST.md \
            docs/RELEASE_READINESS_CI.md; then
            expected_verification_scope=unchanged
          else
            expected_verification_scope=full
          fi
          verification_scope="$(
            npm --silent --prefix backend/release_policy_trust run policy:verify -- \
              --base "$base" \
              --candidate "$CANDIDATE_SHA" \
              --change-base "$change_base" \
              --expected-main "$EXPECTED_MAIN_SHA" \
              --mode "$VERIFICATION_MODE"
          )"
          if [[ "$verification_scope" != "$expected_verification_scope" ]]; then
            echo "Trust-source verifier disagrees with the workflow range classification" >&2
            exit 1
          fi
          if [[ "$expected_verification_scope" == full ]]; then
            npm --prefix backend/release_policy_trust run candidate:generate -- \
              --candidate "$CANDIDATE_SHA" \
              --output "$RUNNER_TEMP/candidate-tree.v1.jsonl"
            cmp \
              backend/release_policy_trust/evidence/review/candidate-tree.v1.jsonl \
              "$RUNNER_TEMP/candidate-tree.v1.jsonl"
          elif [[ "$expected_verification_scope" != unchanged ]]; then
            echo "Unexpected trust-source verification scope" >&2
            exit 1
          fi
          npm --prefix backend/release_policy_trust run codeowners:verify
          npm --prefix backend/release_policy_trust run external:verify
          npm --prefix backend/release_policy_trust run reproduce -- \
            --candidate "$CANDIDATE_SHA" \
            --output "$RUNNER_TEMP/reproducibility.v1.json"
          cmp \
            backend/release_policy_trust/evidence/review/reproducibility.v1.json \
            "$RUNNER_TEMP/reproducibility.v1.json"

  mobile-broker-bypass-guard:
    name: Mobile broker bypass guard
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
      - name: Run guard and negative fixtures
        run: |
          node scripts/mobile_broker_bypass_guard.mjs
          node --test test/mobile_broker_bypass_guard_fixture_test.mjs

  apple-build-guard:
    name: Apple build command guard
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Run safe Apple build regressions
        shell: bash
        run: |
          set -euo pipefail
          bash test/safe_apple_build_test.sh
          bash test/apple_build_command_guard_test.sh
          scripts/check_apple_build_commands.sh

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - name: Check out full repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install checksum-verified Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          printf '%s  %s\n' "$GITLEAKS_LINUX_X64_SHA256" "$archive" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run redacted secret scan
        run: scripts/secret_scan.sh

  release-readiness:
    name: Release readiness
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - workflow-lint
      - flutter-quality
      - android-debug-package
      - backend-and-audit
      - static-site
      - mobile-broker-bypass-guard
      - apple-build-guard
      - secret-scan
      - release-policy-trust
    steps:
      - name: Require every release check to succeed
        shell: bash
        run: |
          set -euo pipefail
          results=(
            "workflow-lint=${{ needs.workflow-lint.result }}"
            "flutter-quality=${{ needs.flutter-quality.result }}"
            "android-debug-package=${{ needs.android-debug-package.result }}"
            "backend-and-audit=${{ needs.backend-and-audit.result }}"
            "static-site=${{ needs.static-site.result }}"
            "mobile-broker-bypass-guard=${{ needs.mobile-broker-bypass-guard.result }}"
            "apple-build-guard=${{ needs.apple-build-guard.result }}"
            "secret-scan=${{ needs.secret-scan.result }}"
            "release-policy-trust=${{ needs.release-policy-trust.result }}"
          )
          printf '%s\n' "${results[@]}"
          for result in "${results[@]}"; do
            [[ "$result" == *=success ]] || exit 1
          done
